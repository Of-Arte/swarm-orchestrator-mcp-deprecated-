mcpServers:
  swarm:
    command: "docker"
    args:
      - "exec"
      - "-i"
      - "swarm-mcp-server"
      - "fastmcp"
      - "run"
      - "server.py"
    env:
      PYTHONUNBUFFERED: "1"
  
  # For local execution without Docker:
  # swarm-local:
  #   command: "fastmcp"
  #   args: ["run", "server.py"]
  #   cwd: "/path/to/swarm"

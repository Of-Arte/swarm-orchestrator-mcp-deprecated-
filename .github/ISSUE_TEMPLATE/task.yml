name: Task/Chore
description: Technical tasks, refactors, or documentation updates.
labels: ["chore"]
body:
  - type: textarea
    id: task
    attributes:
      label: Task Description
      description: What needs to be done?
    validations:
      required: true
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: Why is this task necessary?

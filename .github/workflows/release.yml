name: Release Management

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Release Notes
        id: release_notes
        run: |
          # Extract notes for the current tag from CHANGELOG.md
          # This is a basic version; more complex logic can be added later
          echo "Release summary from CHANGELOG.md" > notes.txt
          head -n 20 CHANGELOG.md >> notes.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: notes.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Project Swarm CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Tests
      run: pytest
      
    - name: Run Lint (Critical Errors Only)
      run: flake8 mcp_core/ tests/ --select=E9,F63,F7,F82 --exclude=.venv
      
    - name: Run Mutation Tests (if configured)
      run: mutmut run || echo "Mutation testing skipped or failed"
      continue-on-error: true
